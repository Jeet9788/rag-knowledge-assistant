services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-ragpassword}@db:5432/${POSTGRES_DB:-ragdb}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      RETRIEVE_TOP_K: ${RETRIEVE_TOP_K:-20}
      FINAL_TOP_K: ${FINAL_TOP_K:-5}
      USE_RERANKER: ${USE_RERANKER:-true}
      RERANKER_MODEL: ${RERANKER_MODEL:-Xenova/ms-marco-MiniLM-L-6-v2}
      CHUNK_SIZE: ${CHUNK_SIZE:-400}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-80}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - hf_cache:/root/.cache

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # Single-origin reverse proxy — the canonical entry point. Serves the UI at /
  # and the API at /api on one address, so the whole app fits behind one HTTPS
  # certificate or tunnel. Reach the app at http://<host> (port 80), not :3000.
  proxy:
    image: caddy:2-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    restart: unless-stopped

  # Free HTTPS in front of the proxy via a Cloudflare quick tunnel. Opt-in:
  #   docker compose --profile tunnel up -d cloudflared
  # The public https://<random>.trycloudflare.com URL is printed in its logs and
  # changes whenever this container restarts (that is the trade-off for needing
  # no domain and no account). Swap in a named tunnel + domain for a stable URL.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate --url http://proxy:80
    depends_on:
      - proxy
    restart: unless-stopped

volumes:
  pgdata:
  hf_cache:
  caddy_data:
